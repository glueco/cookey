name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    # Skip if this is already a "Version Packages" commit (would infinite loop)
    if: "!contains(github.event.head_commit.message, 'Version Packages')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || (sleep 10 && npm ci)

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # When changesets exist → opens/updates "Version Packages" PR
          # When "Version Packages" PR is merged → runs publish
          publish: npm run release
          version: npx changeset version
          commit: "Version Packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
